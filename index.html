<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>구석구석 여행 지도</title>
<!-- 홈화면 바로가기(PWA) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2803c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="여행 지도">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{
  --sea:#a8cfe8; --sea-deep:#8fbedd;
  --land:#fdfaf3; --line:#c8654f;
  --banner:#f2803c; --banner-dark:#e06a26;
  --ink:#3d3229; --sub:#8a7a6b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{touch-action:manipulation;-webkit-text-size-adjust:100%}
body{
  font-family:'Gowun Dodum',sans-serif; color:var(--ink);
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.35) 0 3px, transparent 4px),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,.3) 0 2px, transparent 3px),
    linear-gradient(180deg, var(--sea) 0%, var(--sea-deep) 100%);
  min-height:100vh;
}
/* 탭 */
.tabs{display:flex;gap:10px;justify-content:center;padding:20px 12px 0}
.tab{
  font-family:'Jua';font-size:clamp(15px,3.8vw,20px);border:none;cursor:pointer;
  padding:10px 20px;border-radius:30px;letter-spacing:1px;
  background:rgba(255,255,255,.6);color:#6b7b89;box-shadow:0 3px 0 rgba(0,0,0,.1);
}
.tab.quiztab{font-size:clamp(13px,3.2vw,16px);padding:10px 14px}
/* ---- 퀴즈 ---- */
.region.quiztarget{fill:#ffd54a !important;stroke:#e0a000;stroke-width:2;animation:qpulse 1.2s infinite}
@keyframes qpulse{0%,100%{fill:#ffd54a !important}50%{fill:#ffe89a !important}}
.qmark{font-family:'Jua';fill:#b07000;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
#quizCard{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:80;
  width:min(430px,calc(100% - 20px));display:none;
  background:#fffdf8;border-radius:20px;padding:14px 16px;box-shadow:0 10px 40px rgba(0,0,0,.28);
}
#quizCard.on{display:block}
.qtop{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qmode{font-family:'Jua';font-size:13px;border:1.5px solid #eed7ba;background:#fff;color:#a08a72;
  border-radius:14px;padding:5px 12px;cursor:pointer}
.qmode.on{background:var(--banner);border-color:var(--banner);color:#fff}
.qmode{display:inline-flex;align-items:center;gap:5px}
.qmicon{width:1.1em;height:1.1em;flex:none}
/* ---- 백지도 ---- */
.region.blank{fill:#fdfaf3 !important}
.region.blank.bchecked{fill:#d8f0d8 !important}
.rlabel.blanklabel{opacity:0;transition:opacity .15s}
.rlabel.blanklabel.show{opacity:1}
#blankBar{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:80;
  display:none;align-items:center;gap:10px;
  background:#fffdf8;border-radius:20px;padding:9px 18px;box-shadow:0 8px 26px rgba(0,0,0,.22);
}
#blankBar.on{display:flex}
#blankBar .bstat{font-family:'Jua';font-size:14px;color:var(--banner-dark)}
#blankBar .bbtn{
  font-family:'Jua';font-size:13px;border:none;cursor:pointer;background:#a8b8c4;color:#fff;
  border-radius:14px;padding:7px 14px;
}
.qprog{margin-left:auto;font-family:'Jua';font-size:13px;color:var(--banner-dark)}
.qquit{background:none;border:none;font-size:16px;color:#c9b9a8;cursor:pointer;padding:2px 4px}
#quizCard h3{font-family:'Jua';font-size:16px;text-align:center;margin-bottom:10px}
.qflag{
  display:block;margin:0 auto 8px;width:72px;border-radius:6px;
  border:1px solid rgba(0,0,0,.15);box-shadow:0 2px 6px rgba(0,0,0,.15);
}
.pflag{height:22px;border-radius:4px;border:1px solid rgba(255,255,255,.5);vertical-align:-3px;margin-right:8px}
#quizCard h3 .hl{color:var(--banner-dark)}
.answerrow{display:flex;gap:8px}
.answerrow input{
  flex:1;min-width:0;border:2px solid #eed7ba;border-radius:14px;padding:11px 12px;
  font-family:'Jua';font-size:17px;text-align:center;background:#fff;color:var(--ink);
}
.answerrow input:focus{outline:2px solid var(--banner);border-color:transparent}
.answerrow input.correct{background:#e8f5e9;border-color:#4caf50;animation:qyay .4s}
.answerrow input.wrong{background:#ffebee;border-color:#ef5350;animation:qshake .35s}
@keyframes qyay{50%{transform:scale(1.05)}}
@keyframes qshake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.okbtn{
  font-family:'Jua';font-size:15px;border:none;cursor:pointer;flex:none;
  background:var(--banner);color:#fff;border-radius:14px;padding:11px 18px;box-shadow:0 3px 0 rgba(0,0,0,.12);
}
.okbtn:active{transform:translateY(2px);box-shadow:none}
.hintrow{display:flex;align-items:center;gap:10px;margin-top:7px}
.hintbtn{
  font-family:'Jua';font-size:12px;border:1.5px dashed #e0a86e;background:#fffaf2;color:var(--banner-dark);
  border-radius:12px;padding:5px 11px;cursor:pointer;
}
.hinttext{font-family:'Jua';font-size:15px;color:var(--banner-dark);letter-spacing:4px}
.qtries{margin-left:auto;font-size:12px;color:var(--sub)}
.qresult{font-family:'Jua';text-align:center;margin-top:8px;font-size:14px;min-height:20px}
.qnext{
  display:none;margin:8px auto 0;font-family:'Jua';font-size:14px;border:none;cursor:pointer;
  background:var(--banner);color:#fff;border-radius:14px;padding:9px 24px;box-shadow:0 3px 0 rgba(0,0,0,.12);
}
.tab.on{background:linear-gradient(180deg,var(--banner),var(--banner-dark));color:#fff}
.tab{display:inline-flex;align-items:center;gap:7px}
.tabicon{width:1.15em;height:1.15em;flex:none}
.stats{display:flex;gap:10px;justify-content:center;margin:12px auto 4px;flex-wrap:wrap}
.stat{
  background:rgba(255,255,255,.85);border:2px solid rgba(200,101,79,.25);
  border-radius:16px;padding:6px 16px;font-size:14px;display:flex;gap:8px;align-items:center;
}
.stat b{font-family:'Jua';font-size:20px;color:var(--banner-dark)}
.legend{display:flex;gap:4px;align-items:center;justify-content:center;margin:6px 0 2px;font-size:12px;color:#5b6f7d}
.legend .sw{width:22px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.12)}
.mapwrap{max-width:820px;margin:4px auto 30px;padding:0 8px;position:relative}
#wrapWorld{max-width:1020px;display:none}
svg.map{width:100%;height:auto;display:block;filter:drop-shadow(0 6px 14px rgba(40,80,110,.25));touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
svg.map.dragging{cursor:grabbing}
.zoomctl{position:absolute;right:14px;top:10px;display:flex;flex-direction:column;gap:6px;z-index:10}
.zbtn{
  width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;font-family:'Jua';
  font-size:20px;background:rgba(255,255,255,.92);color:var(--banner-dark);
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}
.zbtn:active{transform:scale(.94)}
.region{fill:var(--land);stroke:var(--line);stroke-width:1.1;cursor:pointer;transition:filter .15s}
.region.island{stroke-width:.7}
.region.country{stroke-width:.55}
.region.dot{stroke-width:.9}
.region:hover{filter:brightness(.93)}
.region.sel{stroke:#7a2d17;stroke-width:2.4}
.rlabel{font-family:'Jua',sans-serif;fill:#4a3f35;pointer-events:none;text-anchor:middle;dominant-baseline:middle}
.capdot{fill:#e53935;stroke:#fff;pointer-events:none}
.caplabel{font-family:'Jua';fill:#b71c1c;text-anchor:start;dominant-baseline:middle;pointer-events:none;
  paint-order:stroke;stroke:rgba(255,255,255,.85);stroke-width:2.5}
.rlabel.lit{fill:#fff;paint-order:stroke;stroke:rgba(120,45,15,.55);stroke-width:2.5}
#tip{
  position:fixed;pointer-events:none;background:#3d3229;color:#fff;font-size:13px;
  padding:5px 10px;border-radius:10px;opacity:0;transition:opacity .1s;z-index:50;white-space:nowrap;
}
/* ---- panel ---- */
#overlay{position:fixed;inset:0;background:rgba(30,50,70,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:90}
#overlay.on{opacity:1;pointer-events:auto}
#panel{
  position:fixed;z-index:100;background:#fffdf8;box-shadow:-8px 0 30px rgba(0,0,0,.2);
  display:flex;flex-direction:column;transition:transform .25s ease;
  top:0;right:0;height:100%;width:min(420px,100%);transform:translateX(105%);
}
#panel.on{transform:translateX(0)}
@media(max-width:600px){
  #panel{top:auto;bottom:0;height:auto;max-height:86%;width:100%;border-radius:22px 22px 0 0;transform:translateY(105%)}
  #panel.on{transform:translateY(0)}
}
.phead{background:linear-gradient(135deg,var(--banner),var(--banner-dark));color:#fff;padding:18px 20px 14px;border-radius:inherit;border-bottom-left-radius:0;border-bottom-right-radius:0;position:relative}
.phead .prov{font-size:13px;opacity:.9}
.phead h2{font-family:'Jua';font-size:28px}
.pclose{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.25);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
.pbody{flex:1;overflow-y:auto;padding:16px 18px}
.pheadrow{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.recobtn{
  font-family:'Jua';font-size:14px;cursor:pointer;margin-right:44px;flex:none;
  background:rgba(255,255,255,.22);color:#fff;border:1.5px dashed rgba(255,255,255,.65);
  border-radius:20px;padding:8px 15px;
}
.recobtn:active{transform:scale(.96)}
.recocard{
  background:#fff4e6;border:2px solid #f0b283;border-radius:16px;padding:14px;margin-bottom:14px;
  animation:pop .25s ease;
}
@keyframes pop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.recocard h3{font-family:'Jua';font-size:17px;color:var(--banner-dark);margin-bottom:10px}
.spot{background:#fff;border:1.5px solid #eee0cf;border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px}
.spot .ic{font-size:22px;line-height:1.3;flex:none}
.spot b{font-family:'Jua';font-size:15px}
.spot p{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.45}
.spottags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.spottag{font-size:11px;background:#ffe8d1;color:var(--banner-dark);border-radius:10px;padding:2px 8px;font-family:'Jua'}
.recofoot{text-align:center;font-size:12px;color:var(--sub);margin-top:4px}
.recotabs{display:flex;gap:6px;margin-bottom:10px}
.recotab{
  font-family:'Jua';font-size:14px;border:none;cursor:pointer;flex:1;
  padding:7px 4px;border-radius:12px;background:#fff;color:#a08a72;border:1.5px solid #eed7ba;
}
.recotab.on{background:var(--banner);border-color:var(--banner);color:#fff}
.friend{background:#fff;border:1.5px solid #eee0cf;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.friend .fr{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.friend b{font-family:'Jua';font-size:14px;color:var(--banner-dark)}
.friend .fdate{font-size:11px;color:#c9b9a8;flex:none}
.friend p{font-size:14px;margin:3px 0}
.friend a{font-size:12px;color:#4a7ebd;word-break:break-all}
.friend .fdel{background:none;border:none;color:#c9b9a8;font-size:13px;cursor:pointer;padding:0 2px}
.faddbox{background:#fff;border:1.5px dashed #e0a86e;border-radius:12px;padding:10px;margin-top:4px}
.faddbox input{
  width:100%;border:1.5px solid #eed7ba;border-radius:10px;padding:7px 10px;
  font-family:inherit;font-size:16px;margin-bottom:6px;background:#fffdf8;
}
.faddbox input:focus{outline:2px solid var(--banner);border-color:transparent}
/* island name */
.namebox{display:flex;gap:8px;margin-bottom:12px}
.namebox input{
  flex:1;min-width:0;border:2px solid #f0d9bd;border-radius:12px;padding:9px 12px;
  font-family:'Jua';font-size:16px;background:#fff;color:var(--ink);
}
.namebox input:focus{outline:2px solid var(--banner);border-color:transparent}
/* counter */
.counterbox{background:#fff;border:2px solid #f0d9bd;border-radius:16px;padding:14px;text-align:center;margin-bottom:14px}
.counterbox h3{font-family:'Jua';font-size:15px;color:var(--sub);margin-bottom:10px}
.counter{display:flex;align-items:center;justify-content:center;gap:18px}
.cbtn{
  font-family:'Jua';width:52px;height:52px;border-radius:50%;border:none;font-size:26px;cursor:pointer;
  background:#ffe8d1;color:var(--banner-dark);box-shadow:0 3px 0 rgba(0,0,0,.1);
}
.cbtn:active{transform:translateY(2px);box-shadow:none}
.cnum{font-family:'Jua';font-size:44px;min-width:70px;color:var(--banner-dark)}
.cnum small{font-size:18px;color:var(--sub)}
.chips{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.chip{
  font-family:'Jua';border:1.5px solid #ecd5b8;background:#fffaf2;border-radius:20px;
  padding:5px 13px;font-size:14px;cursor:pointer;color:#7a6a58;
}
.chip.on{background:var(--banner);border-color:var(--banner);color:#fff}
/* records */
.rechead{
  width:100%;font-family:'Jua';font-size:16px;text-align:left;background:#fff4e6;border:none;
  border-radius:14px;padding:12px 16px;cursor:pointer;color:var(--banner-dark);
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.rechead .arrow{transition:transform .2s}
.recbody{display:none}
.recbody.open{display:block}
.rechead.open .arrow{transform:rotate(180deg)}
.addbox{background:#fff4e6;border:2px dashed #f0b283;border-radius:14px;padding:12px;margin-bottom:14px}
.addbox input,.addbox textarea{
  width:100%;border:1.5px solid #e8cdb2;border-radius:10px;padding:8px 10px;font-family:inherit;
  font-size:16px;margin-bottom:8px;background:#fff;
}
.addbox textarea{resize:vertical;min-height:52px}
.addbox input:focus,.addbox textarea:focus{outline:2px solid var(--banner);border-color:transparent}
.btn{
  font-family:'Jua';border:none;border-radius:12px;padding:9px 18px;font-size:15px;cursor:pointer;
  background:var(--banner);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.12);
}
.btn:active{transform:translateY(2px);box-shadow:none}
.visit{
  background:#fff;border:1.5px solid #eee0cf;border-radius:14px;padding:10px 12px;margin-bottom:10px;
  display:flex;gap:10px;align-items:flex-start;
}
.visit .dot{font-size:20px;line-height:1.4}
.visit .vc{flex:1}
.visit .vd{font-family:'Jua';font-size:14px;color:var(--banner-dark)}
.visit .vp{font-size:15px;margin:2px 0}
.visit .vm{font-size:13px;color:var(--sub);white-space:pre-wrap}
.visit .del{background:none;border:none;color:#c9b9a8;font-size:16px;cursor:pointer;padding:2px}
.visit .del:hover{color:#d9531e}
.empty{text-align:center;color:var(--sub);padding:16px 0;font-size:14px}
/* photo */
.photorow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.photobtn{
  font-family:'Jua';font-size:14px;border:1.5px dashed #e0a86e;background:#fffaf2;color:var(--banner-dark);
  border-radius:10px;padding:8px 14px;cursor:pointer;
}
.photoprev{position:relative;display:none}
.photoprev img{width:140px;height:140px;object-fit:cover;border-radius:14px;border:2px solid #eed7ba;box-shadow:0 3px 8px rgba(0,0,0,.12)}
.photoprev .rm{
  position:absolute;top:-9px;right:-9px;width:26px;height:26px;border-radius:50%;border:2px solid #fff;
  background:#d9531e;color:#fff;font-size:13px;cursor:pointer;line-height:1;
}
.visit .vphoto{width:80px;height:80px;object-fit:cover;border-radius:12px;border:1.5px solid #eee0cf;cursor:pointer;flex:none}
#lightbox{
  position:fixed;inset:0;background:rgba(20,20,25,.88);display:none;align-items:center;justify-content:center;
  z-index:300;cursor:zoom-out;padding:20px;
}
#lightbox.on{display:flex}
#lightbox img{max-width:100%;max-height:100%;border-radius:12px}
/* 나라 정보 */
.infohead{
  width:100%;font-family:'Jua';font-size:16px;text-align:left;background:#eaf3fb;border:none;
  border-radius:14px;padding:12px 16px;cursor:pointer;color:#3d6d99;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.infohead .arrow{transition:transform .2s}
.infohead.open .arrow{transform:rotate(180deg)}
.infocard{
  background:#f4f9fd;border:2px solid #cfe3f3;border-radius:16px;padding:6px 14px;margin-bottom:14px;
  animation:pop .25s ease;
}
.irow{display:flex;align-items:baseline;gap:10px;padding:9px 2px;border-bottom:1px dashed #d8e7f2;font-size:14px}
.irow:last-child{border-bottom:none}
.irow .ik{font-family:'Jua';color:#3d6d99;flex:none;width:76px}
.irow .iv{flex:1}
.irow .iv small{color:var(--sub);font-size:12px}
.infofoot{text-align:center;font-size:11px;color:#9db4c6;padding:8px 0 4px}
footer{display:flex;gap:8px;justify-content:center;padding-bottom:34px;flex-wrap:wrap}
.mini{font-size:13px;padding:7px 14px;background:rgba(255,255,255,.8);color:var(--ink);box-shadow:0 2px 0 rgba(0,0,0,.08)}
/* sync modal */
#syncModal{
  position:fixed;inset:0;background:rgba(30,50,70,.5);display:none;
  align-items:center;justify-content:center;z-index:250;padding:20px;
}
#syncModal.on{display:flex}
.syncbox{
  background:#fffdf8;border-radius:20px;padding:22px 20px;width:min(360px,100%);
  text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.25);
}
.syncbox h3{font-family:'Jua';font-size:20px;color:var(--banner-dark);margin-bottom:8px}
.syncdesc{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:14px}
.coderow{position:relative;margin-bottom:12px}
.syncbox input{
  width:100%;border:2px solid #f0d9bd;border-radius:12px;padding:10px 44px 10px 44px;
  font-family:'Jua';font-size:16px;text-align:center;background:#fff;
}
.syncbox input:focus{outline:2px solid var(--banner);border-color:transparent}
.eyebtn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;opacity:.55;
}
.eyebtn.on{opacity:1}
.syncbtns{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.syncbtns .btn{flex:1;font-size:14px;padding:10px 8px}
.syncstat{font-size:12px;color:var(--sub);min-height:16px;margin-bottom:8px}
.syncclose{background:none;border:none;color:var(--sub);font-size:14px;cursor:pointer;font-family:inherit;text-decoration:underline}
#searchModal{
  position:fixed;inset:0;background:rgba(30,50,70,.5);display:none;
  align-items:flex-start;justify-content:center;z-index:250;padding:60px 16px 16px;
}
#searchModal.on{display:flex}
.searchbox{
  background:#fffdf8;border-radius:20px;padding:16px;width:min(420px,100%);
  box-shadow:0 10px 40px rgba(0,0,0,.25);text-align:center;
}
.searchbox input{
  width:100%;border:2px solid #f0d9bd;border-radius:14px;padding:11px 14px;
  font-family:'Jua';font-size:17px;background:#fff;margin-bottom:8px;
}
.searchbox input:focus{outline:2px solid var(--banner);border-color:transparent}
#searchResults{max-height:46vh;overflow-y:auto;text-align:left}
.sresult{
  display:flex;align-items:center;gap:10px;width:100%;
  background:#fff;border:1.5px solid #eee0cf;border-radius:12px;
  padding:10px 14px;margin-bottom:6px;cursor:pointer;font-family:inherit;font-size:15px;
}
.sresult:hover{background:#fff4e6}
.sresult .sicon{font-size:17px;flex:none}
.sresult .sname{font-family:'Jua';color:var(--ink)}
.sresult .ssub{font-size:12px;color:var(--sub);margin-left:auto;flex:none}
.snone{text-align:center;color:var(--sub);font-size:14px;padding:14px 0}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:#3d3229;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;transition:transform .25s;z-index:200}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ---------- storage ---------- */
const KEY='korea-travel-map-v2';
let mem={};
const store={
  load(){
    try{
      let d=JSON.parse(localStorage.getItem(KEY));
      if(!d){
        const old=JSON.parse(localStorage.getItem('korea-travel-map-v1'));
        if(old){ d={}; for(const k in old) d[k]={c:old[k].length,v:old[k]}; localStorage.setItem(KEY,JSON.stringify(d)); }
      }
      return d||{};
    }catch(e){ return mem }
  },
  save(d){ try{ localStorage.setItem(KEY,JSON.stringify(d)) }catch(e){ mem=d } }
};

/* ---------- photo store (IndexedDB) ---------- */
let idb=null, idbPromise=null; const photoMem={};
function idbOpen(){
  if(idbPromise) return idbPromise;
  idbPromise=new Promise(res=>{
    try{
      const rq=indexedDB.open('travel-map-photos',1);
      rq.onupgradeneeded=()=>rq.result.createObjectStore('p');
      rq.onsuccess=()=>{idb=rq.result;res(idb)};
      rq.onerror=()=>res(null);
      rq.onblocked=()=>res(null);
    }catch(e){res(null)}
  });
  return idbPromise;
}
async function photoPut(id,dataUrl){
  await idbOpen();
  if(!idb){photoMem[id]=dataUrl;return}
  return new Promise(res=>{
    const tx=idb.transaction('p','readwrite');
    tx.objectStore('p').put(dataUrl,id);
    tx.oncomplete=()=>res(); tx.onerror=()=>{photoMem[id]=dataUrl;res()};
  });
}
async function photoGet(id){
  await idbOpen();
  if(!idb) return photoMem[id]||null;
  return new Promise(res=>{
    const rq=idb.transaction('p').objectStore('p').get(id);
    rq.onsuccess=()=>res(rq.result||photoMem[id]||null);
    rq.onerror=()=>res(photoMem[id]||null);
  });
}
async function photoDel(id){
  await idbOpen(); delete photoMem[id];
  if(!idb) return;
  return new Promise(res=>{
    const tx=idb.transaction('p','readwrite');
    tx.objectStore('p').delete(id);
    tx.oncomplete=()=>res(); tx.onerror=()=>res();
  });
}
async function photoDump(){
  await idbOpen();
  const out={...photoMem};
  if(!idb) return out;
  return new Promise(res=>{
    try{
      const st=idb.transaction('p').objectStore('p');
      const kq=st.getAllKeys(), vq=st.getAll();
      let keys=null, vals=null;
      const done=()=>{ if(keys&&vals){keys.forEach((k,i)=>out[k]=vals[i]); res(out);} };
      kq.onsuccess=()=>{keys=kq.result;done()};
      vq.onsuccess=()=>{vals=vq.result;done()};
      kq.onerror=vq.onerror=()=>res(out);
    }catch(e){res(out)}
  });
}
function drawToJpeg(img){
  const MAX=480;
  const w0=img.naturalWidth||img.width, h0=img.naturalHeight||img.height;
  if(!w0||!h0) throw new Error('size0');
  const s=Math.min(1,MAX/Math.max(w0,h0));
  const w=Math.round(w0*s), hh=Math.round(h0*s);
  const cv=document.createElement('canvas'); cv.width=w; cv.height=hh;
  cv.getContext('2d').drawImage(img,0,0,w,hh);
  return cv.toDataURL('image/jpeg',0.72);
}
function loadImg(src){
  return new Promise((res,rej)=>{
    const img=new Image();
    const tm=setTimeout(()=>rej(new Error('timeout')),8000);
    img.onload=()=>{clearTimeout(tm);res(img)};
    img.onerror=()=>{clearTimeout(tm);rej(new Error('decode'))};
    img.src=src;
  });
}
async function resizePhoto(file){
  const url=URL.createObjectURL(file);
  try{
    const img=await loadImg(url);
    return drawToJpeg(img);
  }catch(e1){
    const dataUrl=await new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=()=>res(rd.result); rd.onerror=()=>rej(new Error('read'));
      rd.readAsDataURL(file);
    });
    const img=await loadImg(dataUrl);
    return drawToJpeg(img);
  }finally{
    URL.revokeObjectURL(url);
  }
}

/* ---------- 지도 공통 빌더 ---------- */
const COLORS=['#fdfaf3','#ffe3c2','#ffc38f','#ff9e5c','#f47733','#d9531e'];
const tip=document.getElementById('tip');
const els={};   // id -> {path,label,region,map}
const MAPS={};
const blankState={active:false, type:'kr', checked:new Set(), prevTab:'kr'};

const dispName = id => {
  const r=els[id].region;
  if(!r.parent) return r.n;
  return (data[id]&&data[id].name) || r.n || '이름 없는 섬';
};

function buildMap(key, svgId, regions, baseW, baseH, opt){
  const svg=document.getElementById(svgId);
  const gP=document.createElementNS('http://www.w3.org/2000/svg','g');
  const gT=document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(gP); svg.appendChild(gT);
  const M={key, svg, regions, BASE:{x:0,y:0,w:baseW,h:baseH},
           vb:{x:0,y:0,w:baseW,h:baseH}, MAXZ:opt.maxz, labelBase:opt.labelBase,
           mapMoved:false, labelRAF:0, capdots:[]};

  regions.forEach(r=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',r.d);
    let cls='region';
    if(r.parent) cls+=' island';
    if(opt.country) cls+=' country';
    if(r.dot) cls+=' dot';
    p.setAttribute('class',cls);
    p.dataset.id=r.id;
    p.addEventListener('mousemove',e=>{
      if(quiz.active && quiz.target && r.id===quiz.target.id && !quiz.done){
        tip.innerHTML='🤫 정답은 비밀!';
      }else if(opt.country && CINFO[r.id]){
        tip.innerHTML=`${esc(dispName(r.id))} · <span style="color:#ffd54a">🏛️ ${esc(CINFO[r.id][1])}</span>`;
      }else{
        tip.innerHTML=`${esc(dispName(r.id))} · ${cnt(r.id)}회`;
      }
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+10)+'px'; tip.style.opacity=1;
    });
    p.addEventListener('mouseleave',()=>tip.style.opacity=0);
    gP.appendChild(p);

    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',r.cx); t.setAttribute('y',r.cy);
    t.setAttribute('class','rlabel');
    t.textContent=r.n;
    gT.appendChild(t);
    els[r.id]={path:p,label:t,region:r,map:M};
  });

  // 수도 위치 점 (세계지도 전용)
  if(opt.country){
    const gD=document.createElementNS('http://www.w3.org/2000/svg','g');
    svg.appendChild(gD);
    regions.forEach(r=>{
      const d=CAPDOTS[r.id];
      if(!d) return;
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',d[0]); c.setAttribute('cy',d[1]);
      c.setAttribute('class','capdot'); c.style.display='none';
      gD.appendChild(c);
      const cl=document.createElementNS('http://www.w3.org/2000/svg','text');
      cl.setAttribute('x',d[0]); cl.setAttribute('y',d[1]);
      cl.setAttribute('class','caplabel'); cl.style.display='none';
      cl.textContent=(CINFO[r.id]&&CINFO[r.id][1])||'';
      gD.appendChild(cl);
      M.capdots.push({dot:c,lab:cl,r,d});
    });
  }

  M.applyVB=function(){
    svg.setAttribute('viewBox',`${M.vb.x} ${M.vb.y} ${M.vb.w} ${M.vb.h}`);
    M.scheduleLabels();
  };
  M.clampVB=function(){
    const v=M.vb,B=M.BASE;
    v.w=Math.min(B.w,Math.max(B.w/M.MAXZ,v.w));
    v.h=v.w*B.h/B.w;
    v.x=Math.min(B.w-v.w,Math.max(0,v.x));
    v.y=Math.min(B.h-v.h,Math.max(0,v.y));
  };
  M.toSvgPt=function(cx,cy){
    const r=svg.getBoundingClientRect();
    return { x: M.vb.x+(cx-r.left)/r.width*M.vb.w, y: M.vb.y+(cy-r.top)/r.height*M.vb.h };
  };
  M.zoomAt=function(factor,cx,cy){
    const pt=M.toSvgPt(cx,cy);
    const nw=M.vb.w/factor;
    M.vb.x=pt.x-(pt.x-M.vb.x)*(nw/M.vb.w);
    M.vb.y=pt.y-(pt.y-M.vb.y)*(nw/M.vb.w);
    M.vb.w=nw; M.vb.h=nw*M.BASE.h/M.BASE.w;
    M.clampVB(); M.applyVB();
  };
  M.scheduleLabels=function(){
    if(M.labelRAF) return;
    M.labelRAF=requestAnimationFrame(()=>{ M.labelRAF=0; M.updateLabels(); });
  };
  M.updateLabels=function(){
    const rect=svg.getBoundingClientRect();
    if(!rect.width) return;
    const pxPerUnit=rect.width/M.vb.w;
    const z=M.BASE.w/M.vb.w;
    const grow=Math.min(2.2, Math.pow(z,0.35));
    regions.forEach(r=>{
      const e=els[r.id];
      if(blankState.active && blankState.type===M.key){
        e.label.style.display='';
        e.label.setAttribute('font-size',((r.parent?M.labelBase-1.5:M.labelBase)*1.4/pxPerUnit).toFixed(2));
        return;
      }
      const txt=e.label.textContent;
      if(!txt){ e.label.style.display='none'; return; }
      const base=(r.parent?M.labelBase-1.5:M.labelBase);
      const screenFont=base*grow;
      const screenArea=r.a*pxPerUnit*pxPerUnit;
      const need=screenFont*screenFont*txt.length*1.5;
      if(screenArea<need){ e.label.style.display='none'; return; }
      e.label.style.display='';
      e.label.setAttribute('font-size',(screenFont/pxPerUnit).toFixed(2));
    });
    // 수도 점: 나라가 화면에서 충분히 클 때만 (백지도 모드에서는 숨김)
    M.capdots.forEach(({dot,lab,r,d})=>{
      if(blankState.active && blankState.type===M.key){
        dot.style.display='none'; lab.style.display='none'; return;
      }
      const area=r.a*pxPerUnit*pxPerUnit;
      const showDot=area>2200, showName=area>12000;
      dot.style.display=showDot?'':'none';
      lab.style.display=showName?'':'none';
      if(showDot){
        dot.setAttribute('r',(3/pxPerUnit).toFixed(2));
        dot.setAttribute('stroke-width',(1.1/pxPerUnit).toFixed(2));
      }
      if(showName){
        lab.setAttribute('font-size',(9/pxPerUnit).toFixed(2));
        lab.setAttribute('x',d[0]+5/pxPerUnit);
      }
    });
  };

  // 확대/이동/탭
  svg.addEventListener('wheel',e=>{
    e.preventDefault();
    M.zoomAt(e.deltaY<0?1.15:1/1.15,e.clientX,e.clientY);
  },{passive:false});
  const ptrs=new Map();
  let lastDist=0,lastMid=null,downPos=null,downTarget=null;
  svg.addEventListener('pointerdown',e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    svg.setPointerCapture(e.pointerId);
    if(ptrs.size===1){
      M.mapMoved=false; downPos={x:e.clientX,y:e.clientY};
      downTarget=(e.target&&e.target.dataset&&e.target.dataset.id)?e.target.dataset.id:null;
    }else{
      downTarget=null;
    }
    if(ptrs.size===2){
      const[a,b]=[...ptrs.values()];
      lastDist=Math.hypot(a.x-b.x,a.y-b.y);
      lastMid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    }
  });
  svg.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId))return;
    const prev=ptrs.get(e.pointerId);
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){
      if(downPos && Math.hypot(e.clientX-downPos.x,e.clientY-downPos.y)>7){
        M.mapMoved=true; svg.classList.add('dragging');
      }
      if(M.mapMoved){
        const r=svg.getBoundingClientRect();
        M.vb.x-=(e.clientX-prev.x)/r.width*M.vb.w;
        M.vb.y-=(e.clientY-prev.y)/r.height*M.vb.h;
        M.clampVB(); M.applyVB();
      }
    }else if(ptrs.size===2){
      M.mapMoved=true;
      const[a,b]=[...ptrs.values()];
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
      if(lastDist>0) M.zoomAt(dist/lastDist,mid.x,mid.y);
      if(lastMid){
        const r=svg.getBoundingClientRect();
        M.vb.x-=(mid.x-lastMid.x)/r.width*M.vb.w;
        M.vb.y-=(mid.y-lastMid.y)/r.height*M.vb.h;
        M.clampVB(); M.applyVB();
      }
      lastDist=dist; lastMid=mid;
    }
  });
  function endPtr(e){
    ptrs.delete(e.pointerId);
    if(ptrs.size<2){lastDist=0;lastMid=null;}
    if(ptrs.size===0){
      svg.classList.remove('dragging');
      if(!M.mapMoved && downTarget){
        if(blankState.active && blankState.type===M.key) revealBlank(downTarget);
        else if(!quiz.active) openPanel(downTarget);
      }
      downTarget=null;
      setTimeout(()=>{M.mapMoved=false;},50);
    }
  }
  svg.addEventListener('pointerup',endPtr);
  svg.addEventListener('pointercancel',endPtr);

  MAPS[key]=M;
  return M;
}

    const M=MAPS[b.dataset.map]; if(!M) return;
    if(b.dataset.z==='reset'){ M.vb={...M.BASE}; M.applyVB(); return; }
    const rect=M.svg.getBoundingClientRect();

    M.zoomAt(b.dataset.z==='in'?1.5:1/1.5, cx, cy);

/* ---------- 색칠 + 통계 ---------- */
let curTab='kr';
function paint(){
  // 색
  for(const id in els){
    const n=cnt(id);
    const e=els[id];
    if(blankState.active && blankState.type===e.map.key) continue; // 백지도는 색칠 안 보여줌
    e.path.style.fill=COLORS[Math.min(n,5)];
    if(e.region.parent) e.label.textContent=(data[id]&&data[id].name)||e.region.n;
    e.label.classList.toggle('lit', n>=3);
  }
  // 통계 (현재 탭 기준)
  const isWorld=curTab==='world';
  const list=isWorld?WORLD.countries:REGIONS;
  const visitedBase=new Set(); let total=0;
  list.forEach(r=>{
    const n=cnt(r.id);
    if(n>0){ visitedBase.add(r.id.split('#')[0]); total+=n; }
  });
  document.getElementById('stLabel').textContent=isWorld?'가 본 나라':'가 본 지역';
  document.getElementById('stTotal').textContent=isWorld?WORLD.countries.length:REGIONS.filter(r=>!r.parent).length;
  document.getElementById('stRegions').textContent=visitedBase.size;
  document.getElementById('stVisits').textContent=total;
  Object.values(MAPS).forEach(M=>M.scheduleLabels());
}

  blankState.active=true; blankState.type=type; blankState.checked=new Set();
  document.getElementById('tabBlank').classList.add('on');
  document.getElementById('tabKr').classList.remove('on');

  document.getElementById('tabQuiz').classList.remove('on');
  closePanel();
  curTab=type;
  document.getElementById('wrapKr').style.display = type==='kr'?'block':'none';
  document.getElementById('wrapWorld').style.display = type==='world'?'block':'none';
  const total = type==='kr' ? REGIONS.filter(r=>!r.parent&&!r.dot).length : WORLD.countries.filter(c=>!c.dot).length;
  document.getElementById('blankStat').textContent=`0 / ${total}개 확인`;
  document.getElementById('blankBar').classList.add('on');

  const list = type==='kr' ? REGIONS : WORLD.countries;
  list.forEach(r=>{
    const e=els[r.id]; if(!e) return;
    e.path.classList.add('blank'); e.path.classList.remove('bchecked');
    e.label.classList.add('blanklabel'); e.label.classList.remove('show');
  });
  Object.values(MAPS).forEach(M=>M.scheduleLabels());
}
function clearBlankClasses(){
  const list = blankState.type==='kr' ? REGIONS : WORLD.countries;
  list.forEach(r=>{
    const e=els[r.id]; if(!e) return;
    e.path.classList.remove('blank','bchecked');
    e.label.classList.remove('blanklabel','show');
  });
}
function endBlank(backTab){
  clearBlankClasses();
  blankState.active=false;
  document.getElementById('blankBar').classList.remove('on');
  document.getElementById('tabBlank').classList.remove('on');
  setTab(backTab||blankState.prevTab);
}
function revealBlank(id){
  const e=els[id]; if(!e) return;
  const dotType=blankState.type;
  const list = dotType==='kr' ? REGIONS : WORLD.countries;
  const total = dotType==='kr' ? list.filter(r=>!r.parent&&!r.dot).length : list.filter(c=>!c.dot).length;
  const baseId = id.split('#')[0];
  e.path.classList.add('bchecked');
  e.label.classList.add('show');
  clearTimeout(e._blankTm);
  e._blankTm=setTimeout(()=>e.label.classList.remove('show'),1300);
  if(!e.region.dot){ blankState.checked.add(baseId); }
  document.getElementById('blankStat').textContent=`${blankState.checked.size} / ${total}개 확인`;
}

/* ---------- 나라 정보 ---------- */
const KR_POP=5170, KR_AREA=10.04;
function josa(word,a,b){ // (는/은)
  const c=word.charCodeAt(word.length-1);
  if(c>=0xAC00&&c<=0xD7A3) return (c-0xAC00)%28===0?a:b;
  return a;
}
function fmtHours(n){
  const hh=Math.floor(Math.abs(n)), mm=Math.round((Math.abs(n)-hh)*60);
  return mm? `${hh}시간 ${mm}분` : `${hh}시간`;
}
function fmtPop(p){
  if(p>=10000) return '약 '+(p/10000).toFixed(1).replace('.0','')+'억 명';
  if(p>=1) return '약 '+Math.round(p).toLocaleString()+'만 명';
  return '약 '+Math.round(p*10000).toLocaleString()+'명';
}
function fmtArea(a){
  if(a>=1) return '약 '+(a>=100?Math.round(a).toLocaleString():(+a.toFixed(1)).toString().replace(/\.0$/,''))+'만 km²';
  return '약 '+Math.round(a*10000).toLocaleString()+' km²';
}
function cmpKor(v,base){
  const r=v/base;
  if(r>=1.15) return ` <small>(대한민국의 약 ${r>=10?Math.round(r).toLocaleString():(+r.toFixed(1)).toString().replace(/\.0$/,'')}배)</small>`;
  if(r<=0.85){ const inv=base/v; return ` <small>(대한민국의 약 1/${inv>=10?Math.round(inv).toLocaleString():(+inv.toFixed(1)).toString().replace(/\.0$/,'')})</small>`; }
  return ' <small>(대한민국과 비슷)</small>';
}
function fmtTz(tz){
  if(typeof tz==='string') return tz.startsWith('지역')?tz:'한국보다 '+tz;
  if(tz===0) return '한국과 같음';
  return `한국보다 ${fmtHours(tz)} ${tz>0?'빠름':'느림'}`;
}

    data=decData(v.data||{});

    if(cur){ renderCount(); renderVisits(); }
    updateSyncStat('내려받기 완료!');

    fbdb.ref('travelmap/'+codeKey()).set({

    }).catch(()=>{});
  },3000);
};

const QUIZ_TOTAL=10;
const ALIAS={

 '미국':['미합중국'],'체코':['체코공화국'],'영국':['잉글랜드'],
 '코트디부아르':['코트디브아르','아이보리코스트','상아해안'],

 '키르기스스탄':['키르기즈스탄','키르기스'],'아랍에미리트':['UAE','두바이'],

 '세인트빈센트 그레나딘':['세인트빈센트'],'북마케도니아':['마케도니아'],
 '동티모르':['티모르'],'콩고민주공화국':['민주콩고','DR콩고','디알콩고'],
 '중앙아프리카공화국':['중앙아프리카'],'도미니카공화국':['도미니카공'],
 '사이판(북마리아나)':['사이판','북마리아나'],'우도(통영)':['우도'],'저도(창원)':['저도'],
 '죽도(울릉)':['죽도'],'기점·소악도':['기점소악도','소악도','기점도'],

function choseong(s){
  const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
  let out='';
  for(const ch of s){
    const c=ch.charCodeAt(0);
    if(c>=0xAC00&&c<=0xD7A3) out+=CHO[Math.floor((c-0xAC00)/588)];
    else out+=ch;
  }
  return out;
}
function qNormalize(s,isKr){
  s=(s||'').replace(/[\s·()]/g,'');
  if(isKr && s.length>=3 && /[시군구도]$/.test(s)) s=s.slice(0,-1);
  return s;
}
function almostEqual(a,b){
  // 길이 같고 4글자 이상이면 한 글자 차이까지 인정
  if(a.length!==b.length || a.length<4) return false;
  let diff=0;
  for(let i=0;i<a.length;i++){ if(a[i]!==b[i] && ++diff>1) return false; }
  return diff<=1;
}
function qMatch(input,answer,isKr){
  const a=qNormalize(answer,isKr), v=qNormalize(input,isKr);
  if(!v) return false;
  if(v===a) return true;
  if(isKr && (v===answer||v+'시'===answer||v+'군'===answer)) return true;
  const al=ALIAS[answer]||[];
  if(al.some(x=>qNormalize(x,isKr)===v)) return true;
  return almostEqual(v,a);
}
function quizPool(type){
  return type==='kr'
    ? REGIONS.filter(r=>!r.parent&&!r.dot)
    : WORLD.countries.filter(c=>!c.dot);
}
function startQuiz(type){
  if(!quiz.active) quiz.prevTab=curTab;
  quiz.active=true; quiz.type=type; quiz.qnum=0; quiz.score=0; quiz.used=[];
  document.getElementById('qModeKr').classList.toggle('on',type==='kr');
  document.getElementById('qModeWorld').classList.toggle('on',type!=='kr');
  document.getElementById('tabQuiz').classList.add('on');
  document.getElementById('tabKr').classList.remove('on');
  document.getElementById('tabWorld').classList.remove('on');
  closePanel();
  document.getElementById('quizCard').classList.add('on');
  nextQuestion();
}
function clearTarget(){
  if(!quiz.target) return;
  const e=els[quiz.target.id];
  e.path.classList.remove('quiztarget');
  e.label.style.visibility='';
  if(quiz.qEl){quiz.qEl.remove();quiz.qEl=null;}
}
function endQuiz(backTab){
  clearTarget();
  quiz.active=false; quiz.target=null;
  document.getElementById('quizCard').classList.remove('on');
  document.getElementById('tabQuiz').classList.remove('on');
  setTab(backTab||quiz.prevTab);
}
function nextQuestion(){
  clearTarget();
  if(quiz.qnum>=QUIZ_TOTAL){ return showQuizEnd(); }
  quiz.qnum++;
  const pool=quizPool(quiz.type).filter(r=>!quiz.used.includes(r.id));
  const t=pool[Math.floor(Math.random()*pool.length)];
  quiz.target=t; quiz.used.push(t.id); quiz.tries=2; quiz.done=false;
  // 지도 전환 + 확대
  const mapKey=quiz.type==='kr'?'kr':'world';
  curTab=mapKey;
  document.getElementById('wrapKr').style.display = mapKey==='kr'?'block':'none';
  document.getElementById('wrapWorld').style.display = mapKey==='world'?'block':'none';
  paint();
  const M=MAPS[mapKey];
  const span=Math.sqrt(Math.max(t.a||100,4));
  let vw=Math.min(M.BASE.w, Math.max(M.BASE.w/M.MAXZ, span*(quiz.type==='kr'?13:11)));
  M.vb.w=vw; M.vb.h=vw*M.BASE.h/M.BASE.w;
  M.vb.x=t.cx-vw/2; M.vb.y=t.cy-M.vb.h/2;
  M.clampVB(); M.applyVB();
  // 대상 강조 + 이름 숨김 + ? 마커
  const e=els[t.id];
  e.path.classList.add('quiztarget');
  e.label.style.visibility='hidden';
  const q=document.createElementNS('http://www.w3.org/2000/svg','text');
  q.setAttribute('x',t.cx); q.setAttribute('y',t.cy);
  q.setAttribute('class','qmark');
  q.setAttribute('font-size',(vw/22).toFixed(1));
  q.textContent='?';
  e.label.parentNode.appendChild(q);
  quiz.qEl=q;
  // 카드
  document.getElementById('qProg').textContent=`${quiz.qnum}/${QUIZ_TOTAL} · ⭐${quiz.score}`;
  const flagImg = (quiz.type==='world' && t.f)
    ? `<img class="qflag" src="https://flagcdn.com/w160/${t.f}.png" alt="국기" onerror="this.style.display='none'">` : '';
  document.getElementById('qBody').innerHTML=`
    <h3>${flagImg}노란색으로 빛나는 <span class="hl">${quiz.type==='kr'?'이 지역':'이 나라'}</span>의 이름은?</h3>
    <div class="answerrow">
      <input type="text" id="qInput" placeholder="${quiz.type==='kr'?'지역 이름 입력':'나라 이름 입력'}" autocomplete="off" enterkeyhint="done">
      <button class="okbtn" id="qOk">확인</button>
    </div>
    <div class="hintrow">
      <button class="hintbtn" id="qHint">💡 초성 힌트</button>
      <span class="hinttext" id="qHintText"></span>
      <span class="qtries" id="qTries">기회 2번</span>
    </div>
    <div class="qresult" id="qResult"></div>
    <button class="qnext" id="qNext">다음 문제 ▶</button>`;
  const inp=document.getElementById('qInput');
  document.getElementById('qOk').onclick=checkAnswer;
  inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') checkAnswer(); });
  document.getElementById('qHint').onclick=function(){
    document.getElementById('qHintText').textContent=choseong(quiz.target.n);
    this.disabled=true; this.style.opacity=.5;
  };
  document.getElementById('qNext').onclick=nextQuestion;
}
function revealAnswer(){
  const e=els[quiz.target.id];
  e.label.style.visibility='';
  if(quiz.qEl){quiz.qEl.remove();quiz.qEl=null;}
}
function checkAnswer(){
  if(quiz.done) return;
  const inp=document.getElementById('qInput');
  const v=inp.value.trim(); if(!v) return;
  const res=document.getElementById('qResult');
  const isKr=quiz.type==='kr';
  if(qMatch(v,quiz.target.n,isKr)){
    quiz.done=true; quiz.score++;
    inp.classList.remove('wrong'); inp.classList.add('correct'); inp.disabled=true;
    const spots=RECO[quiz.target.id];
    res.textContent=spots?`🎉 정답! ${spots[0][1]}의 고장, ${quiz.target.n}!`:`🎉 정답! ${quiz.target.n}이에요`;
    res.style.color='#2e7d32';
    revealAnswer();
    document.getElementById('qProg').textContent=`${quiz.qnum}/${QUIZ_TOTAL} · ⭐${quiz.score}`;
    document.getElementById('qNext').style.display='block';
  }else{
    quiz.tries--;
    inp.classList.remove('wrong'); void inp.offsetWidth;
    inp.classList.add('wrong');
    if(quiz.tries>0){
      document.getElementById('qTries').textContent='기회 '+quiz.tries+'번';
      res.textContent='다시 한번 생각해 보세요!'; res.style.color='#c62828';
      inp.select();
    }else{
      quiz.done=true; inp.disabled=true;
      res.textContent=`아쉬워요! 정답은 "${quiz.target.n}"`; res.style.color='#c62828';
      revealAnswer();
      document.getElementById('qNext').style.display='block';
    }
  }
}
function showQuizEnd(){
  const s=quiz.score;
  const msg=s>=9?'🏆 지리 박사님!':s>=7?'🎉 대단해요!':s>=5?'😊 좋아요, 조금만 더!':'💪 다음엔 더 잘할 수 있어요!';
  document.getElementById('qProg').textContent=`완료 · ⭐${s}`;
  document.getElementById('qBody').innerHTML=`
    <h3 style="font-size:20px">${QUIZ_TOTAL}문제 중 <span class="hl">${s}개</span> 정답!</h3>
    <div class="qresult" style="font-size:16px">${msg}</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="okbtn" onclick="startQuiz(quiz.type)">🔄 다시 하기</button>
      <button class="okbtn" style="background:#a8b8c4" onclick="endQuiz()">그만하기</button>
    </div>`;
}

function searchAll(q){
  if(!q) return [];
  const ql=q.toLowerCase();
  const res=[];
  for(const id in els){
    const e=els[id]; const r=e.region;
    const nm=dispName(id);
    const hay=(nm+' '+(r.parent||'')).toLowerCase();
    if(hay.includes(ql)){
      res.push({id, nm, isWorld:e.map.key==='world', sub:r.parent?`${r.p} · ${r.parent} 부근`:(e.map.key==='world'?'세계':r.p),
                starts:nm.toLowerCase().startsWith(ql)});
    }
  }
  res.sort((a,b)=>(b.starts-a.starts)||(a.nm.length-b.nm.length));
  return res.slice(0,15);
}
function renderSearch(q){
  const box=document.getElementById('searchResults');
  const res=searchAll(q);
  if(!q){ box.innerHTML='<div class="snone">예: 강릉, 청산도, 싱가포르, 프랑스</div>'; return; }
  if(!res.length){ box.innerHTML='<div class="snone">검색 결과가 없어요</div>'; return; }
  box.innerHTML='';
  res.forEach(r=>{
    const b=document.createElement('button'); b.className='sresult';
    b.innerHTML=`<span class="sicon">${r.isWorld?'🌍':'📍'}</span>
      <span class="sname">${esc(r.nm)}</span>
      <span class="ssub">${esc(r.sub)}</span>`;
    b.onclick=()=>{
      searchModal.classList.remove('on');
      goToRegion(r.id);
    };
    box.appendChild(b);
  });
}
function goToRegion(id){
  const e=els[id]; const M=e.map; const r=e.region;
  // 탭 전환
  if(M.key!==curTab) setTab(M.key);
  // 지역 크기에 맞춰 확대
  const span=Math.sqrt(Math.max(r.a||100,4));
  let vw=Math.min(M.BASE.w, Math.max(M.BASE.w/M.MAXZ, span*9));
  M.vb.w=vw; M.vb.h=vw*M.BASE.h/M.BASE.w;
  M.vb.x=r.cx-vw/2; M.vb.y=r.cy-M.vb.h/2;
  M.clampVB(); M.applyVB();
  openPanel(id);
}

document.getElementById('lightbox').onclick=()=>{

};

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('on'),1800);
}
